name: build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/determinate-nix-action@v3
      - run: nix flake check
      - run: nix build .#darwinConfigurations.macbookair.system
